# ─────────────────────────────────────────────────────────────────────────────
# Mineo — Release workflow
#
# Triggers on any tag that starts with "v" (e.g. v1.2.3).
#
# Steps:
#   1. Build the React client (Node 20 + npm)
#   2. Cross-compile the Go binary for all targets
#   3. Create a GitHub Release and upload all binaries as assets
#
# Tag & release:
#   git tag v1.0.0 && git push origin v1.0.0
# ─────────────────────────────────────────────────────────────────────────────
name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write   # needed to create releases and upload assets

jobs:
  # ── Job 1: Build the React/Webpack client ──────────────────────────────────
  build-client:
    name: Build client
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        run: cd client && npm ci

      - name: Build
        run: cd client && npm run build

      - name: Upload client dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: client-dist
          path: client/dist/
          retention-days: 1

  # ── Job 2: Cross-compile Go for every target ───────────────────────────────
  build-go:
    name: Build Go (${{ matrix.os }}/${{ matrix.arch }})
    needs: build-client
    runs-on: ubuntu-latest

    strategy:
      matrix:
        include:
          - os: linux
            arch: amd64
            asset_suffix: linux_amd64
          - os: linux
            arch: arm64
            asset_suffix: linux_arm64
          - os: darwin
            arch: amd64
            asset_suffix: darwin_amd64
          - os: darwin
            arch: arm64
            asset_suffix: darwin_arm64
          - os: windows
            arch: amd64
            asset_suffix: windows_amd64
            binary_ext: .exe

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: server/go.mod
          cache-dependency-path: server/go.sum

      - name: Download client dist artifact
        uses: actions/download-artifact@v4
        with:
          name: client-dist
          path: server/client_dist/

      - name: Build binary
        env:
          GOOS:   ${{ matrix.os }}
          GOARCH: ${{ matrix.arch }}
          CGO_ENABLED: '0'
        run: |
          cd server
          go build -trimpath \
            -ldflags="-s -w -X main.version=${{ github.ref_name }}" \
            -o "../mineo_${{ matrix.asset_suffix }}${{ matrix.binary_ext || '' }}" \
            .

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: mineo_${{ matrix.asset_suffix }}
          path: mineo_${{ matrix.asset_suffix }}${{ matrix.binary_ext || '' }}
          retention-days: 1

  # ── Job 3: Create GitHub Release and attach all binaries ──────────────────
  release:
    name: Create GitHub Release
    needs: build-go
    runs-on: ubuntu-latest

    steps:
      - name: Checkout (for release notes)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history so we can generate a changelog

      - name: Download all binary artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: mineo_*
          path: dist/
          merge-multiple: true

      - name: List assets
        run: ls -lh dist/

      - name: Generate changelog
        id: changelog
        run: |
          # Collect commits since the previous tag
          PREV_TAG=$(git tag --sort=-version:refname | grep -v "^${{ github.ref_name }}$" | head -1 || echo "")
          if [ -n "$PREV_TAG" ]; then
            RANGE="${PREV_TAG}..${{ github.ref_name }}"
          else
            RANGE="${{ github.ref_name }}"
          fi
          COMMITS=$(git log "$RANGE" --no-merges --pretty=format:"- %s (%h)" 2>/dev/null | head -50 || echo "- Initial release")
          echo "commits<<EOF" >> "$GITHUB_OUTPUT"
          echo "$COMMITS"      >> "$GITHUB_OUTPUT"
          echo "EOF"           >> "$GITHUB_OUTPUT"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Mineo ${{ github.ref_name }}
          body: |
            ## What's Changed

            ${{ steps.changelog.outputs.commits }}

            ---

            ## Installation

            ```bash
            curl -fsSL https://raw.githubusercontent.com/minhnhat97kg/mineo/master/install.sh | bash
            ```

            Or download the binary for your platform below and place it in your `$PATH`.

            | Platform       | Binary                        |
            |---------------|-------------------------------|
            | Linux x86_64  | `mineo_linux_amd64`           |
            | Linux arm64   | `mineo_linux_arm64`           |
            | macOS x86_64  | `mineo_darwin_amd64`          |
            | macOS Apple Silicon | `mineo_darwin_arm64`    |
            | Windows x86_64 | `mineo_windows_amd64.exe`    |
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}  # e.g. v1.0.0-beta → prerelease
          files: dist/*
